<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>PEMILIHAN</h1>
    <p>PEMILIHAN</p>
    <script>
        //contoh if saja
        var nilai = 80;
        if (nilai >= 75) {//kondisi benar
            console.log("LULUS");
        }

        //contoh if else
        var nilai = 60;
        if (nilai >= 75) {//kondisi benar
            console.log("LULUS");
        } else {//kondisi salah
            console.log("TIDAK LULUS");
        }

        //contoh nested if
        var nilai = 85;
        if (nilai >= 90) {//kondisi benar
            console.log("SANGAT MEMUASKAN");
        } else if (nilai >= 75) {//kondisi benar
            console.log("MEMUASKAN");
        } else {//kondisi salah
            console.log("TIDAK MEMUASKAN");
        }
    </script>
</body>
</html>
