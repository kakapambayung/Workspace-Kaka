<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    //contoh fungsi tanpa parameter
    function halo() {
        console.log("HALO SEMUA");
    }
    halo();

    //contoh fungsi dengan parameter
    function sapa(nama) {
        console.log("HALO " + nama);
    }
    sapa("KAKA");

    //contoh fungsi dengan return value
    function tambah(a, b) {
        return a + b;
    }
    var hasil = tambah(5, 3)
    console.log(hasil); //Output: 8
    </script>
</body>
</html>
