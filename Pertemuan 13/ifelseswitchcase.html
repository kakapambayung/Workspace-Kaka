<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No 1 - If Else dan Switch Case</title>
</head>
<body>

  <h2>Program Cek Nilai Mahasiswa</h2>

  <label>Masukkan Nilai:</label>
  <input type="number" id="nilai" placeholder="Contoh: 85">

  <br><br>

  <label>Pilih Mata Kuliah:</label>
  <select id="matkul">
    <option value="web">Pemrograman Web</option>
    <option value="basisdata">Basis Data</option>
    <option value="jaringan">Jaringan Komputer</option>
  </select>

  <br><br>

  <button onclick="cekNilai()">Cek Hasil</button>

  <h3>Output:</h3>
  <p id="hasil"></p>

  <script>
    function cekNilai() {
      let nilai = parseInt(document.getElementById("nilai").value);
      let matkul = document.getElementById("matkul").value;
      let grade = "";
      let status = "";
      let namaMatkul = "";

      if (isNaN(nilai) || nilai < 0 || nilai > 100) {
        document.getElementById("hasil").innerHTML = "Nilai tidak valid. Masukkan nilai 0 sampai 100.";
        return;
      }

      if (nilai >= 85) {
        grade = "A";
        status = "Lulus dengan sangat baik";
      } else if (nilai >= 75) {
        grade = "B";
        status = "Lulus dengan baik";
      } else if (nilai >= 60) {
        grade = "C";
        status = "Lulus cukup";
      } else if (nilai >= 40) {
        grade = "D";
        status = "Tidak lulus";
      } else {
        grade = "E";
        status = "Tidak lulus dan harus mengulang";
      }

      switch (matkul) {
        case "web":
          namaMatkul = "Pemrograman Web";
          break;
        case "basisdata":
          namaMatkul = "Basis Data";
          break;
        case "jaringan":
          namaMatkul = "Jaringan Komputer";
          break;
        default:
          namaMatkul = "Mata kuliah tidak ditemukan";
      }

      document.getElementById("hasil").innerHTML =
        "Mata Kuliah: " + namaMatkul + "<br>" +
        "Nilai: " + nilai + "<br>" +
        "Grade: " + grade + "<br>" +
        "Status: " + status;
    }
  </script>

</body>
</html>
