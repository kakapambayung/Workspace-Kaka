<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator JavaScript</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#202124;
}

.calculator{
    width:340px;
    background:#111;
    padding:20px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#display{
    width:100%;
    height:90px;
    background:#111;
    border:none;
    color:white;
    text-align:right;
    font-size:42px;
    padding:10px;
    margin-bottom:15px;
    outline:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:50%;
    font-size:24px;
    cursor:pointer;
    background:#333;
    color:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.gray{
    background:#d4d4d2;
    color:black;
}

.orange{
    background:#ff9f0a;
}

.zero{
    grid-column:span 2;
    border-radius:35px;
    text-align:left;
    padding-left:28px;
}
</style>

</head>
<body>

<div class="calculator">

    <input type="text" id="display" disabled>

    <div class="buttons">

        <button class="gray" onclick="clearDisplay()">AC</button>
        <button class="gray" onclick="deleteLast()">⌫</button>
        <button class="gray" onclick="appendValue('%')">%</button>
        <button class="orange" onclick="appendValue('÷')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="orange" onclick="appendValue('×')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="orange" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="orange" onclick="appendValue('+')">+</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>

    </div>

</div>

<script>

const display = document.getElementById("display");

function formatNumber(num){
    if(num === "") return "";
    return num.replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function formatDisplay(){

    let value = display.value.replace(/\./g,"");

    let parts = value.split(/([+\-×÷%])/);

    let formatted = parts.map(part => {

        if(part === "") return part;

        if(!isNaN(part)){
            return formatNumber(part);
        }

        return part;

    });

    display.value = formatted.join("");
}

function appendValue(value){

    const operators = ["+","-","×","÷","%"];

    if(operators.includes(value)){
        display.value += value;
        return;
    }

    display.value += value;
    formatDisplay();
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){

    display.value = display.value.slice(0,-1);

    formatDisplay();
}

function calculate(){

    try{

        let expression = display.value
            .replace(/\./g,"")
            .replace(/×/g,"*")
            .replace(/÷/g,"/");

        let result = eval(expression);

        display.value = Number(result).toLocaleString("id-ID");

    }
    catch{

        display.value = "Error";

    }
}

</script>

</body>
</html>
